<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor - CodeSync</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/diff_match_patch/20121119/diff_match_patch.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
</head>
<body>
<div class="container-fluid">
    <div class="header" style="margin-bottom: 20px;">
        <h3 id="docTitleHeader" style="font-weight: 600;">Loading Document...</h3>
        <div class="header-actions">
            <button id="btnBack" class="btn-sm btn-secondary">← Back to Dashboard</button>
        </div>
    </div>

    <div class="editor-container">
        <div class="editor-status">
            <div class="status-group">
                <span id="connIndicator" class="status-indicator status-offline"></span>
                <span id="connText">Connecting...</span>
            </div>
            <span id="saveStatus" style="color: var(--text-muted);">All changes saved</span>
        </div>
        <label for="editor" style="display:none;">Code Editor</label>
        <textarea id="editor" disabled placeholder="Establishing real-time connection..."></textarea>
    </div>
</div>
<script src="document.js"></script>
</body>
</html>
