<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - CodeSync</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
    <div class="header">
        <h2>CodeSync</h2>
        <div class="header-actions">
            <label for="sortSelect"></label><select id="sortSelect" class="btn-sm" style="margin-bottom: 0;">
                <option value="createdDesc">Newest Created</option>
                <option value="createdAsc">Oldest Created</option>
                <option value="savedDesc">Recently Saved</option>
                <option value="savedAsc">Oldest Saved</option>
            </select>
            <button id="btnNewDoc" class="btn-sm">+ New Document</button>
            <button id="btnProfile" class="btn-sm btn-success">My Profile</button>
        </div>
    </div>

    <div id="docGrid" class="doc-grid"></div>

    <div class="pagination-controls">
        <button id="btnPrevPage" disabled>Previous</button>
        <span id="pageIndicator" class="page-indicator">Page 1</span>
        <button id="btnNextPage" disabled>Next</button>
    </div>
</div>

<div id="createModal" class="modal">
    <div class="modal-content">
        <h3>Create New Document</h3>
        <div id="createErrorMsg" class="error-msg"></div>
        <form id="createForm">
            <label class="field-label" for="docTitle">Document Title *</label>
            <input type="text" id="docTitle" placeholder="My Awesome Document" required maxlength="100">

            <label class="field-label" for="docAccessCode">Access Code (Optional for private docs)</label>
            <input type="text" id="docAccessCode" placeholder="Alphanumeric, 4-20 chars" minlength="4" maxlength="20" pattern="^[a-zA-Z0-9]*$">

            <label class="field-label" for="docFileToClone">Clone from File (Optional)</label>
            <input type="file" id="docFileToClone">

            <div class="modal-actions">
                <button type="button" id="btnCancel" class="btn-secondary">Cancel</button>
                <button type="submit" id="btnSubmitCreate">Create</button>
            </div>
        </form>
    </div>
</div>

<div id="accessModal" class="modal">
    <div class="modal-content">
        <h3>Private Document</h3>
        <p style="margin-bottom: 20px; font-size: 0.9rem; color: var(--text-muted);">This document requires an access code.</p>
        <div id="accessErrorMsg" class="error-msg"></div>
        <form id="accessForm">
            <label class="field-label" for="accessCodeInput">Access Code</label>
            <input type="password" id="accessCodeInput" placeholder="Enter Access Code" required>
            <div class="modal-actions">
                <button type="button" id="btnCancelAccess" class="btn-secondary">Cancel</button>
                <button type="submit" id="btnSubmitAccess">Join Document</button>
            </div>
        </form>
    </div>
</div>
<script src="index.js"></script>
</body>
</html>
