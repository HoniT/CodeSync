<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile - CodeSync</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
  <div class="header">
    <h2 id="usernameHeader">Loading Profile...</h2>
    <div class="header-actions">
      <button id="btnDashboard" class="btn-sm btn-secondary">← Dashboard</button>
      <button id="btnLogout" class="btn-sm btn-danger">Logout</button>
    </div>
  </div>

  <h3 style="margin-bottom: 24px; font-weight: 600;">My Created Documents</h3>
  <div id="myDocGrid" class="doc-grid"></div>

  <div class="pagination-controls">
    <button id="btnPrevPage" disabled>Previous</button>
    <span id="pageIndicator" class="page-indicator">Page 1</span>
    <button id="btnNextPage" disabled>Next</button>
  </div>
</div>

<div id="accessModal" class="modal">
  <div class="modal-content">
    <h3>Private Document</h3>
    <p style="margin-bottom: 20px; font-size: 0.9rem; color: var(--text-muted);">This document requires an access code.</p>
    <div id="accessErrorMsg" class="error-msg"></div>
    <form id="accessForm">
      <label class="field-label" for="accessCodeInput">Access Code</label>
      <input type="password" id="accessCodeInput" placeholder="Enter Access Code" required>
      <div class="modal-actions">
        <button type="button" id="btnCancelAccess" class="btn-secondary">Cancel</button>
        <button type="submit" id="btnSubmitAccess">Join Document</button>
      </div>
    </form>
  </div>
</div>
<script src="profile.js"></script>
</body>
</html>
