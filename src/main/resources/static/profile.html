<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile - CodeSync</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
  <div class="header">
    <h2 id="usernameHeader">Loading Profile...</h2>
    <div class="header-actions">
      <button id="btnDashboard" class="btn-sm" style="background-color: #333;">← Dashboard</button>
      <button id="btnLogout" class="btn-sm btn-danger">Logout</button>
    </div>
  </div>

  <h3 style="margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px;">My Created Documents</h3>
  <div id="myDocGrid" class="doc-grid"></div>
</div>
<script src="profile.js"></script>
</body>
</html>
